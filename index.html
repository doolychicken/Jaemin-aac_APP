<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="preconnect" href="https://www.youtube.com" />
  <link rel="preconnect" href="https://img.youtube.com" />
  <link rel="preconnect" href="https://i.ytimg.com" />
  <title>AAC 앱</title>
  <link rel="stylesheet" href="./css/app.css?v=7" />
</head>
<body>
  <main class="app">
    <div id="returnHint" class="return-hint">유튜브 시청 후 Safari 왼쪽 상단 뒤로 버튼으로 AAC로 돌아오세요.</div>
    <div class="topbar">
      <div>
        <h1 id="screenTitle" class="title">메인 화면</h1>
        <p id="breadcrumb" class="crumb" style="display:none;"></p>
      </div>
      <div class="topbar-btns">
        <button id="homeButton" class="home-btn" style="display:none;">🏠 홈</button>
        <button id="backButton" class="back-btn" style="display:none;">뒤로 가기</button>
      </div>
    </div>

    <section id="playerWrap" class="player-wrap" style="display:none;">
      <iframe
        id="youtubePlayer"
        class="player"
        title="AAC YouTube Player"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="origin"
        allowfullscreen>
      </iframe>
    </section>
    <button id="openInYoutubeButton" class="back-btn" style="display:none; align-self:flex-start;">유튜브에서 열기</button>

    <p id="helperText" class="muted">버튼을 누르면 음성으로 읽어줍니다.</p>
    <section id="heroRow" class="hero" style="display:none;"></section>
    <section id="spotlightView" class="spotlight" style="display:none;" aria-label="선택한 그림">
      <button type="button" id="spotlightButton" class="spotlight-button">
        <img id="spotlightImage" alt="" />
      </button>
    </section>
    <section id="buttonGrid" class="grid"></section>
  </main>

  <script src="./js/data.js?v=7"></script>
  <script src="./js/app.js?v=7"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .catch(() => {/* silent fail on non-HTTPS dev */});
      });
    }
  </script>
</body>
</html>
